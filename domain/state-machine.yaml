# =============================================================================
# domain/state-machine.yaml
# Máquina de estados CANÔNICA do CASH-OUT determinístico — FONTE ÚNICA.
#
# Arquivo para MÁQUINA: parseado na geração de código e em runtime. Não é prosa.
# STATUS: rascunho — revisar. (Estados/transições do cash-out; faltam VALORES
# operacionais: timeouts, retries, nº de confirmações por rede — Faixa B/pauta.)
#
# MVP = CASH-OUT (ADR-016): o cliente ENTREGA cripto e RECEBE BRL no PIX, via
# SmartPay. Três caminhos (providers/smartpay.md):
#   - FAST   : cliente envia USDT (Polygon/Solana/Tron) DIRETO p/ a SmartPay, que
#              paga o PIX em ~10s. Sem MEXC, sem conversão. (path == FAST)
#   - DEX    : qualquer token em Polygon/Solana/Tron → swap on-chain via DEX
#              (Jupiter/SunSwap/1inch) → USDT → SmartPay → PIX. Cliente deposita
#              em carteira HD derivada pelo quote-simulator; USDT cai direto na
#              SmartPay como receiver do swap. (path == DEX)
#   - CONVERT: demais moedas/redes depositam na CONTA MASTER MEXC (ADR-017);
#              depósito identificado por txId on-chain; vendemos spot -> USDT,
#              sacamos o USDT p/ a SmartPay, que paga o PIX. (path == CONVERT)
#
# Inversão de risco vs. cash-in: aqui O CLIENTE MOVE PRIMEIRO (depósito on-chain é
# IRREVERSÍVEL). Por isso há estados para depósito errado/atrasado, risco de preço
# no convert e falha de payout. Capital-light: o cliente traz o ativo e a SmartPay
# frente o BRL (confirmar pré-funding — pauta). Sem estoque/reserva (ADR-011/014 são
# de cash-in/fase 2).
#
# Disparo & falha (ADR-007): cada transição que move valor é JOB idempotente na fila
# (BullMQ/Redis), em UMA transação ACID (ADR-004); o próximo job é enfileirado na
# MESMA transação (OUTBOX — ADR-013). Em falha: retry/backoff -> dead-letter ->
# estado. Qualquer falha pós-depósito (dinheiro do cliente já em nossas mãos) vai
# para MANUAL_REVIEW — nada termina em silêncio.
#
# Detecção de depósito: CONVERT usa polling da MEXC (GET /capital/deposit/hisrec
# filtrado por txId na conta master — ADR-017); FAST usa o webhook da SmartPay.
# Em ambos, um MONITOR long-running (no VPS — ADR-015) traduz isso em eventos.
#
# Screening/compliance (ADR-012): guard `screening_passed` ANTES de pagar o payout
# (cripto->fiat é vetor de lavagem). Hoje é seam/no-op; política pendente (pauta).
#
# Modelo de conta (ADR-017): conta master única para todos os depósitos CONVERT.
# Depósito identificado por txId on-chain (não por sub-conta). A máquina assume
# `depositTxId`; idempotência via `newClientOrderId` (venda) e `withdrawOrderId` (saque).
# =============================================================================

version: 1
flow: cash-out

initial: QUOTE_CREATED

# ---------------------------------------------------------------------------
# Estados canônicos. name é estável (UPPER_SNAKE) — NUNCA renomear sem ADR.
#   type: normal | terminal_success | terminal_failure
#   timeout_s / on_timeout: prazo antes de uma transição automática (valores TODO)
# ---------------------------------------------------------------------------
states:
  - name: QUOTE_CREATED
    description: Cotação de venda gerada (ativo, rede, quantidade, taxa, BRL a receber, caminho FAST|CONVERT) travada por TTL; aguarda aceite.
    type: normal
    timeout_s: TODO
    on_timeout: EXPIRED

  - name: AWAITING_DEPOSIT
    description: "Cliente aceitou; mostramos o endereço de depósito: SmartPay direto (FAST), carteira HD do DEX (DEX) ou conta master MEXC (CONVERT — ADR-017). Aguarda envio on-chain do cliente."
    type: normal
    timeout_s: TODO            # janela p/ o cliente depositar; limita o risco de preço (convert)
    on_timeout: EXPIRED

  - name: DEPOSIT_DETECTED
    description: (CONVERT) Depósito do cliente visto on-chain/MEXC, ainda sem confirmações suficientes.
    type: normal

  - name: DEPOSIT_CONFIRMED
    description: (CONVERT) Depósito confirmado e batendo com a cotação (quantidade/rede/prazo). Pronto para vender.
    type: normal

  - name: SELLING
    description: (CONVERT) Venda spot na MEXC (cripto -> USDT); aguarda fill.
    type: normal

  - name: SOLD
    description: (CONVERT) Venda preenchida dentro da tolerância; USDT na conta master MEXC.
    type: normal

  - name: FORWARDING
    description: (CONVERT) Saque do USDT da MEXC para a carteira da SmartPay.
    type: normal

  - name: PAYING_OUT
    description: SmartPay recebeu o USDT e está pagando o PIX ao cliente (FAST, DEX e CONVERT convergem aqui).
    type: normal
    timeout_s: TODO
    on_timeout: MANUAL_REVIEW

  - name: MANUAL_REVIEW
    description: Cripto do cliente já recebida e o fluxo automático não pode decidir (depósito divergente, under-fill, payout falhou, dead-letter). Operador resolve.
    type: normal

  - name: REFUNDING_CRYPTO
    description: Devolução da cripto ao cliente (no CONVERT, saque on-chain de volta; no FAST, resolução com a SmartPay). MVP pode ser operacional — ver runbook.
    type: normal

  - name: COMPLETED
    description: Cliente recebeu o PIX em BRL; operação concluída.
    type: terminal_success

  - name: REFUNDED
    description: Não houve pagamento em BRL; a cripto foi devolvida ao cliente. Resolução limpa de um caso "recebido, não pago".
    type: terminal_failure

  - name: EXPIRED
    description: Cliente não depositou no prazo (ou cotação expirou) — nada movido, falha limpa.
    type: terminal_failure

  - name: FAILED
    description: Baixa terminal após revisão — caso irrecuperável e não reembolsável (write-off). Só a partir de MANUAL_REVIEW. Exige reconciliação.
    type: terminal_failure

# ---------------------------------------------------------------------------
# Transições (whitelist). Tudo que NÃO estiver aqui é proibido.
#   guard           : condição determinística (ADR-001/002/012/016)
#   effect          : <port>.<method> do _capability-contract.yaml (ADR-006)
#   trigger         : queue_job | webhook_inbound | deposit_monitor | timeout
#   on_failure      : retry -> dead_letter -> failure_state (ADR-007)
#   idempotency_key : chave natural por etapa. cash_out_id = id interno do cash-out (1:1 com o quote).
# ---------------------------------------------------------------------------
transitions:

  # --- Cotação -> aguardando depósito. Efeito depende do caminho. ---
  - from: QUOTE_CREATED
    to: AWAITING_DEPOSIT
    event: QUOTE_ACCEPTED
    guard: path == FAST and screening_passed     # FAST: pede endereço de depósito à SmartPay
    effect: off_ramp.create_payout_order
    trigger:
      type: queue_job
      job: create_payout_order
      idempotency_key: cash_out_id
    on_failure:
      retry: { max_attempts: TODO, backoff: TODO }
      dead_letter: true
      failure_state: EXPIRED                       # nada movido ainda -> falha limpa

  - from: QUOTE_CREATED
    to: AWAITING_DEPOSIT
    event: QUOTE_ACCEPTED
    guard: path == CONVERT and screening_passed    # CONVERT: endereço de depósito da conta master MEXC (ADR-017)
    effect: exchange.get_deposit_address
    trigger:
      type: queue_job
      job: get_deposit_address
      idempotency_key: cash_out_id
    on_failure:
      retry: { max_attempts: TODO, backoff: TODO }
      dead_letter: true
      failure_state: EXPIRED

  - from: QUOTE_CREATED
    to: EXPIRED
    event: QUOTE_EXPIRED
    trigger: { type: timeout }

  - from: AWAITING_DEPOSIT
    to: EXPIRED
    event: DEPOSIT_NOT_RECEIVED
    trigger: { type: timeout }                     # cliente não depositou -> falha limpa

  # --- DEX: swap on-chain → USDT → SmartPay (receiver do swap = endereço SmartPay) ---
  - from: QUOTE_CREATED
    to: AWAITING_DEPOSIT
    event: QUOTE_ACCEPTED
    guard: path == DEX and screening_passed
    effect: dex_swap.create_swap_order             # cria payout SmartPay + ordem DEX (SmartPay como receiver)
    trigger:
      type: queue_job
      job: create_swap_order
      idempotency_key: cash_out_id
    on_failure:
      retry: { max_attempts: TODO, backoff: TODO }
      dead_letter: true
      failure_state: EXPIRED

  # --- FAST e DEX: SmartPay recebe USDT (direto ou via swap on-chain) e paga PIX ---
  - from: AWAITING_DEPOSIT
    to: PAYING_OUT
    event: SMARTPAY_RECEIVED
    guard: path == FAST
    trigger:
      type: webhook_inbound
      idempotency_key: cash_out_id                 # webhook duplicado = no-op (ADR-008)

  - from: AWAITING_DEPOSIT
    to: PAYING_OUT
    event: SMARTPAY_RECEIVED
    guard: path == DEX
    trigger:
      type: webhook_inbound
      idempotency_key: cash_out_id

  # --- CONVERT: depósito on-chain do cliente na conta master MEXC (identificado por txId — ADR-017) ---
  - from: AWAITING_DEPOSIT
    to: DEPOSIT_DETECTED
    event: DEPOSIT_SEEN
    guard: path == CONVERT
    trigger:
      type: deposit_monitor
      idempotency_key: deposit_tx_id

  - from: DEPOSIT_DETECTED
    to: DEPOSIT_CONFIRMED
    event: DEPOSIT_CONFIRMED
    guard: deposit_matches_quote                   # quantidade/rede/prazo batem com a cotação
    trigger:
      type: deposit_monitor
      idempotency_key: deposit_tx_id

  - from: DEPOSIT_DETECTED
    to: MANUAL_REVIEW
    event: DEPOSIT_MISMATCH                         # valor errado / rede errada / fora do prazo
    guard: not deposit_matches_quote                # cripto já recebida (irreversível) -> humano

  # --- CONVERT: vende spot -> USDT (ADR-001, agora venda) ---
  - from: DEPOSIT_CONFIRMED
    to: SELLING
    event: SELL_STARTED
    effect: exchange.sell_spot
    trigger:
      type: queue_job
      job: sell_spot
      idempotency_key: cash_out_id:sell
    on_failure:
      retry: { max_attempts: TODO, backoff: TODO }
      dead_letter: true
      failure_state: MANUAL_REVIEW

  - from: SELLING
    to: SOLD
    event: SELL_FILLED
    guard: fill_within_tolerance                    # under-fill além da tolerância -> MANUAL_REVIEW
    effect: exchange.get_order
    trigger:
      type: queue_job
      job: confirm_sell
      idempotency_key: order_id
    on_failure:
      retry: { max_attempts: TODO, backoff: TODO }
      dead_letter: true
      failure_state: MANUAL_REVIEW

  - from: SELLING
    to: MANUAL_REVIEW
    event: SELL_UNDER_TOLERANCE
    guard: not fill_within_tolerance

  # --- CONVERT: saca o USDT para a SmartPay ---
  - from: SOLD
    to: FORWARDING
    event: FORWARD_STARTED
    effect: exchange.withdraw_onchain               # destino: carteira USDT da SmartPay
    trigger:
      type: queue_job
      job: forward_to_smartpay
      idempotency_key: cash_out_id:forward
    on_failure:
      retry: { max_attempts: TODO, backoff: TODO }
      dead_letter: true
      failure_state: MANUAL_REVIEW

  - from: FORWARDING
    to: PAYING_OUT
    event: SMARTPAY_RECEIVED
    trigger:
      type: webhook_inbound
      idempotency_key: cash_out_id

  # --- Payout: SmartPay paga o PIX (FAST e CONVERT) ---
  - from: PAYING_OUT
    to: COMPLETED
    event: SMARTPAY_PAID
    trigger:
      type: webhook_inbound
      idempotency_key: cash_out_id

  - from: PAYING_OUT
    to: MANUAL_REVIEW
    event: PAYOUT_FAILED                            # ex.: chave PIX inválida; USDT já na SmartPay
    trigger:
      type: webhook_inbound
      idempotency_key: cash_out_id

  # --- Revisão manual: retoma, reembolsa a cripto, ou baixa ---
  - from: MANUAL_REVIEW
    to: SELLING
    event: REVIEW_RETRY_SELL
    effect: exchange.sell_spot
    trigger: { type: queue_job, job: sell_spot, idempotency_key: cash_out_id:sell }
    on_failure:
      retry: { max_attempts: TODO, backoff: TODO }
      dead_letter: true
      failure_state: MANUAL_REVIEW

  - from: MANUAL_REVIEW
    to: FORWARDING
    event: REVIEW_RETRY_FORWARD
    effect: exchange.withdraw_onchain
    trigger: { type: queue_job, job: forward_to_smartpay, idempotency_key: cash_out_id:forward }
    on_failure:
      retry: { max_attempts: TODO, backoff: TODO }
      dead_letter: true
      failure_state: MANUAL_REVIEW

  - from: MANUAL_REVIEW
    to: PAYING_OUT
    event: REVIEW_RETRY_PAYOUT                       # ex.: corrigiu a chave PIX e reenviou o payout
    effect: off_ramp.retry_payout
    trigger: { type: queue_job, job: retry_payout, idempotency_key: cash_out_id:payout }
    on_failure:
      retry: { max_attempts: TODO, backoff: TODO }
      dead_letter: true
      failure_state: MANUAL_REVIEW

  - from: MANUAL_REVIEW
    to: REFUNDING_CRYPTO
    event: REFUND_DECIDED
    trigger: { type: queue_job, job: refund_crypto, idempotency_key: cash_out_id:refund }

  - from: MANUAL_REVIEW
    to: FAILED
    event: WRITE_OFF
    trigger: { type: queue_job, job: write_off, idempotency_key: cash_out_id:writeoff }

  # --- Devolução da cripto -> resolvido ---
  - from: REFUNDING_CRYPTO
    to: REFUNDED
    event: REFUND_COMPLETED
    effect: exchange.withdraw_onchain               # CONVERT: devolve ao endereço do cliente. FAST: resolução com a SmartPay (runbook).
    trigger:
      type: queue_job
      job: refund_crypto
      idempotency_key: cash_out_id:refund
    on_failure:
      retry: { max_attempts: TODO, backoff: TODO }
      dead_letter: true
      failure_state: MANUAL_REVIEW

# ---------------------------------------------------------------------------
# Efeitos inline acima (campo `effect`). Sem agente no MVP (princípio 3 / ADR-003):
# tudo determinístico. Eventos de confirmação (DEPOSIT_*, SELL_*, SMARTPAY_*) vêm do
# MONITOR (WebSocket privado MEXC p/ depósito e venda; webhook SmartPay p/ payout).
# ---------------------------------------------------------------------------
