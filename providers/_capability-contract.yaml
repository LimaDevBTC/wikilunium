# =============================================================================
# providers/_capability-contract.yaml
# CONTRATO DE CAPABILITY: as INTERFACES (ports) que todo provedor implementa.
#
# Arquivo para MÁQUINA: parseado na geração de código (gera as interfaces tipadas)
# e em runtime (seleção/validação de provedor).
# STATUS: rascunho — revisar. (Operações derivadas da state-machine de CASH-OUT —
# ADR-016; tipos exatos e valores de provedor ficam nos providers/<nome>.md.)
#
# PORTS & ADAPTERS (ADR-006): cada item de `ports` é uma INTERFACE; provedores
# concretos são ADAPTERS. Interface comum: nome, operações (methods), modos de
# falha (failure_modes) e limites (limits). Trocar de provedor = trocar o adapter.
#
# MVP = CASH-OUT (ADR-016): off_ramp (SmartPay) paga o BRL; exchange (MEXC) recebe
# depósito, VENDE spot -> USDT e saca o USDT p/ a SmartPay (convert). on_ramp
# (Eulen, PIX-in) é de cash-in -> fase 2.
# =============================================================================

version: 1

# Adapters conhecidos (provider -> port). Detalhe real em providers/<nome>.md.
adapters:
  smartpay: { port: off_ramp, status: mvp }      # providers/smartpay.md — paga BRL no PIX
  mexc:     { port: exchange, status: mvp }       # providers/mexc.md — depósito + venda spot + saque
  eulen:    { port: on_ramp,  status: fase_2 }    # providers/eulen.md — PIX-in (cash-in, fase 2)

ports:

  # ---------------------------------------------------------------------------
  off_ramp:
    description: Saída de cripto para BRL — recebe USDT e paga o cliente no PIX (SmartPay).
    limits: TODO            # TODO: redes/tokens aceitos, limites, prazo de liquidação (conta SmartPay)
    methods:

      create_payout_order:
        description: Abre um pedido de payout e retorna o endereço de depósito p/ o cliente enviar o USDT (FAST). Idempotente por cash_out_id.
        inputs:
          cash_out_id: string
          asset: string             # USDT
          network: string           # polygon | solana | tron
          amount: decimal           # USDT esperado
          brl_amount: decimal       # BRL a pagar (cotação)
          pix_key: string           # destino do PIX do cliente
        outputs:
          payout_order_id: string
          deposit_address: string
          deposit_tag: string       # memo/tag se a rede exigir
          expires_at: timestamp
        failure_modes: [rejected, network_unsupported, provider_unavailable]
        idempotent: true            # chave: cash_out_id

      retry_payout:
        description: Reenvia o payout (ex. após corrigir a chave PIX) sem re-receber o USDT.
        inputs: { payout_order_id: string, pix_key: string }
        outputs: { status: enum }   # paying | paid | failed
        failure_modes: [invalid_pix_key, rejected, provider_unavailable]
        idempotent: true            # chave: cash_out_id:payout

      get_payout_status:
        description: Consulta o status de um payout (fallback do webhook).
        inputs: { payout_order_id: string }
        outputs: { status: enum, paid_at: timestamp, pix_e2e_id: string }
        failure_modes: [not_found, provider_unavailable]
        idempotent: true

      verify_webhook:
        description: Verifica assinatura do webhook e normaliza o evento da SmartPay.
        inputs: { payload: bytes, signature: string }
        outputs:
          payout_order_id: string
          event: enum               # received (USDT chegou) | paid (PIX enviado) | failed
        failure_modes: [signature_invalid, duplicate]   # duplicate = no-op idempotente (ADR-008)
        idempotent: true            # chave: payout_order_id / cash_out_id

  # ---------------------------------------------------------------------------
  exchange:
    description: Catálogo, endereço de depósito, venda spot, saque on-chain e sub-contas (MEXC).
    limits: TODO            # TODO: rate limits, limites de saque por rede
    methods:

      get_catalog:
        description: Catálogo dinâmico (min/max, taxa, redes por moeda).
        inputs: {}                   # GET /api/v3/capital/config/getall (Lunium.md §7)
        outputs:
          assets: list               # [{ symbol, networks[], min, max, fee, precision }]
        failure_modes: [provider_unavailable]
        idempotent: true

      get_deposit_address:
        description: Endereço de depósito da sub-conta do cliente (CONVERT) — depósito identificável (ADR-002).
        inputs: { subaccount_id: string, asset: string, network: string }
        outputs: { address: string, tag: string }
        failure_modes: [network_unsupported, provider_unavailable]
        idempotent: true

      get_deposit:
        description: Status de um depósito on-chain (confirmações) — fonte dos eventos DEPOSIT_*.
        inputs: { subaccount_id: string, asset: string, tx_id: string }
        outputs: { status: enum, amount: decimal, confirmations: int }   # status: pending|confirmed
        failure_modes: [not_found, provider_unavailable]
        idempotent: true

      sell_spot:
        description: Venda spot do ativo depositado contra USDT (ADR-001 — agora venda). Market modelada como limit IOC ~10%.
        inputs:
          subaccount_id: string
          symbol: string             # par negociável (ativo/USDT)
          base_amount: decimal       # quanto vender (do ativo depositado)
        outputs:
          order_id: string
          status: enum               # filled | partially_filled | rejected
          filled_qty: decimal        # USDT recebido
          avg_price: decimal
          fee: decimal
        failure_modes: [partial_fill, insufficient_balance, symbol_halted, provider_unavailable]
        idempotent: true             # chave: cash_out_id:sell

      get_order:
        description: Status de uma ordem (confirma fill, inclusive parcial — ADR-001).
        inputs: { subaccount_id: string, order_id: string }
        outputs: { status: enum, filled_qty: decimal, avg_price: decimal }
        failure_modes: [not_found, provider_unavailable]
        idempotent: true

      withdraw_onchain:
        description: Saque on-chain — USDT para a SmartPay (forward) ou cripto de volta ao cliente (refund).
        inputs:
          subaccount_id: string
          asset: string
          network: string            # rede precisa estar habilitada (failure: network_suspended)
          address: string
          tag: string
          amount: decimal
        outputs:
          withdrawal_id: string
          status: enum               # requested | processing | completed | failed
          tx_id: string
        failure_modes: [network_suspended, address_invalid, insufficient_balance, provider_unavailable]
        idempotent: true             # chave: cash_out_id:forward | cash_out_id:refund (evita saque dobrado)

      get_withdrawal:
        description: Status do saque (confirmação on-chain).
        inputs: { withdrawal_id: string }
        outputs: { status: enum, tx_id: string, confirmations: int }
        failure_modes: [not_found, provider_unavailable]
        idempotent: true

      subaccount_create:
        description: Cria sub-conta segregada por usuário (ADR-002) — depósito identificável.
        inputs: { user_ref: string }
        outputs: { subaccount_id: string }
        failure_modes: [already_exists, provider_unavailable]
        idempotent: true             # chave: user_ref

      subaccount_balance:
        description: Saldo de um ativo na sub-conta (reconciliação).
        inputs: { subaccount_id: string, asset: string }
        outputs: { available: decimal, locked: decimal }
        failure_modes: [not_found, provider_unavailable]
        idempotent: true

  # ---------------------------------------------------------------------------
  # on_ramp (Eulen, PIX-in) é de CASH-IN -> fase 2 (ADR-016). Mantido aqui como
  # casca; não usar no MVP. Doutrina/métodos em providers/eulen.md.
  on_ramp:
    status: fase_2
    description: (FASE 2) Entrada de fiat via PIX para cash-in (comprar cripto). Não usar no MVP.

# ---------------------------------------------------------------------------
# Contratos transversais que TODO adapter respeita (a demo MEXC não os tem —
# Lunium.md §7). Monitor em tempo real (MEXC): WebSocket privado, polling fallback.
# ---------------------------------------------------------------------------
cross_cutting:
  # Mecanismos DECIDIDOS; valores específicos de provedor (números) seguem TODO (Faixa B).
  idempotency:
    by: per_step
    keys: state-machine.yaml   # cash_out_id[:step] | payout_order_id | order_id | deposit_tx_id | withdrawal_id
    enforcement: db_unique_constraint   # chave persistida com unique no Postgres (ADR-004); repetição = no-op
  outbox:
    enabled: true              # enfileira o próximo job na MESMA transação ACID da transição (ADR-013)
  retry:
    via: queue                 # BullMQ/Redis (ADR-007)
    policy: { max_attempts: TODO, backoff: exponential, dead_letter: true }
    on_exhaustion: failure_state   # cada transição define o estado de falha (state-machine.yaml)
  error_normalization:
    rule: provider_error_to_failure_mode   # todo adapter mapeia erro do provedor -> failure_mode listado acima
  rate_limits:
    smartpay: TODO             # TODO: confirmar com a conta SmartPay (Faixa B)
    mexc: TODO                 # TODO: rate limits de API + limites de saque por rede (Faixa B)
